<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tea list</title>
<meta name="theme-color" content="#4a7c59">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tea list">
<style>
  :root {
    --green: #4a7c59;
    --green-dark: #3a6146;
    --green-light: #e8f0ea;
    --bg: #f7f5f0;
    --card: #ffffff;
    --text: #333;
    --muted: #888;
    --border: #e0ddd5;
    --star: #e8a33d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header { position: relative; }
  #menu-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(255,255,255,0.9);
    cursor: pointer; padding: 4px; display: flex; align-items: center;
  }
  #menu-pop {
    display: none; position: absolute; right: 10px; top: 100%; margin-top: 4px;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15); z-index: 20; overflow: hidden;
  }
  .menu-item {
    display: block; width: 100%; padding: 11px 18px; background: none; border: none;
    text-align: left; font-size: 0.9rem; color: var(--text); cursor: pointer; white-space: nowrap;
  }
  .menu-item:hover { background: var(--green-light); }
  header {
    background: var(--green);
    color: #fff;
    padding: 18px 20px;
    text-align: center;
  }
  header h1 { font-size: 1.3rem; font-weight: 600; }
  header p { font-size: 0.8rem; opacity: 0.85; }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }
  /* tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    background: var(--card); color: var(--text); font-size: 0.95rem;
    cursor: pointer; border: 1px solid var(--border);
  }
  .tab.active { background: var(--green); color: #fff; border-color: var(--green); }
  .panel { display: none; }
  .panel.active { display: block; }
  /* form */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 14px;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 9px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 0.95rem; font-family: inherit; background: #fff;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }
  .stars { display: flex; gap: 4px; font-size: 1.6rem; cursor: pointer; user-select: none; }
  .stars span { color: #ccc; transition: color 0.1s; }
  .stars span.on { color: var(--star); }
  .btn {
    display: block; width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: var(--green); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
  }
  .btn:hover { background: var(--green-dark); }
  /* list */
  .filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filters input, .filters select {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.9rem; font-family: inherit; background: #fff;
  }
  .filters input { flex: 1; min-width: 150px; }
  .record { position: relative; cursor: pointer; }
  .record:hover { border-color: var(--green); }
  .rec-flex { display: flex; gap: 14px; align-items: center; height: 150px; }
  .rec-flex .rec-body { flex: 1; min-width: 0; max-height: 112px; overflow: hidden; }
  .rec-flex .rec-title, .rec-flex .meta, .rec-flex .note {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rec-photo {
    width: 104px; height: 104px; object-fit: cover; border-radius: 8px;
    flex-shrink: 0; margin-right: 28px;
  }
  .record .type-badge {
    display: inline-block; background: var(--green-light); color: var(--green-dark);
    font-size: 0.75rem; padding: 2px 10px; border-radius: 999px; margin-right: 6px;
  }
  .record h3 { font-size: 1.05rem; display: inline; }
  .record .meta { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .record .rating { color: var(--star); font-size: 0.95rem; }
  .record .note { font-size: 0.9rem; margin-top: 6px; white-space: pre-wrap; }
  .record .del {
    position: absolute; top: 14px; right: 14px; background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 1.1rem;
  }
  .record .del:hover { color: #c0392b; }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; }
  .view-btn {
    width: 34px; height: 30px; border: 1px solid var(--border); border-radius: 6px;
    background: #fff; cursor: pointer; color: var(--muted); font-size: 0.95rem;
  }
  .view-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
  #records.tiles {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px;
  }
  .tile {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; cursor: pointer; position: relative;
  }
  .tile:hover { border-color: var(--green); }
  .tile-img {
    aspect-ratio: 1; background: #f7f1e5; display: flex;
    align-items: center; justify-content: center;
  }
  .tile-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tile-name { padding: 8px 10px; font-size: 0.85rem; line-height: 1.4; height: 3.2em; overflow: hidden; }
  .tile .del {
    position: absolute; top: 6px; right: 6px; background: rgba(255,255,255,0.85);
    border: none; border-radius: 50%; width: 24px; height: 24px;
    cursor: pointer; color: var(--muted); font-size: 0.9rem; padding: 0;
  }
  .tile .del:hover { color: #c0392b; }
  /* stats */
  .stat-summary { display: flex; gap: 12px; margin-bottom: 14px; }
  .stat-box {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; text-align: center;
  }
  .stat-box .num { font-size: 1.6rem; font-weight: 700; color: var(--green-dark); }
  .stat-box .lbl { font-size: 0.75rem; color: var(--muted); }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bar-row .bar-label { width: 90px; font-size: 0.85rem; text-align: right; flex-shrink: 0; }
  .bar-row .bar-track { flex: 1; background: var(--green-light); border-radius: 6px; height: 22px; overflow: hidden; }
  .bar-row .bar-fill { height: 100%; background: var(--green); border-radius: 6px; min-width: 2px; }
  .bar-row .bar-val { width: 50px; font-size: 0.8rem; color: var(--muted); flex-shrink: 0; }
  .map-btn {
    width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 6px;
    background: #fff; font-size: 1.1rem; cursor: pointer; color: var(--text);
  }
  .map-btn:hover { background: var(--green-light); }
  #btn-excel {
    padding: 0 11px; border: none; border-radius: 8px; background: var(--green);
    color: #fff; cursor: pointer; display: flex; align-items: center; flex-shrink: 0;
  }
  #q-type, #q-rating { flex: 1; min-width: 0; }
  #btn-excel:hover { background: var(--green-dark); }
  .drop-zone {
    border: 2px dashed var(--border); border-radius: 8px; padding: 18px;
    text-align: center; color: var(--muted); font-size: 0.85rem; cursor: pointer; background: #fff;
  }
  .drop-zone.over { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
  h2.section { font-size: 1rem; margin-bottom: 10px; }
  @media (max-width: 480px) {
    .row { flex-direction: column; gap: 0; }
    .tab { padding: 8px 4px; font-size: 0.85rem; }
    .container { padding: 12px; }
    .rec-flex { height: 130px; gap: 10px; }
    .rec-photo { width: 88px; height: 88px; margin-right: 20px; }
    #records.tiles { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
    .stat-box .num { font-size: 1.2rem; }
    .filters input { flex-basis: 100%; }
  }
</style>
</head>
<body>
<header>
  <button id="menu-btn" title="データ管理"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z"/><circle cx="12" cy="12" r="3"/></svg></button>
  <div id="menu-pop">
    <button class="menu-item" id="btn-export">データを書き出す(JSON)</button>
    <button class="menu-item" id="btn-import">データを読み込む(JSON)</button>
    <input type="file" id="file-import" accept=".json,application/json" style="display:none">
  </div>
  <h1>Tea list</h1>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" data-panel="add">記録する</button>
    <button class="tab" data-panel="list">一覧</button>
    <button class="tab" data-panel="stats">統計</button>
    <button class="tab" data-panel="pair">ペアリング</button>
  </div>

  <!-- 記録 -->
  <div class="panel active" id="panel-add">
    <div class="card">
      <div class="field">
        <label>お茶の名前 *</label>
        <input type="text" id="f-name" placeholder="例:玉露、アールグレイ">
      </div>
      <div class="row">
        <div class="field">
          <label>カテゴリ</label>
          <select id="f-type"></select>
          <input type="text" id="f-type-custom" placeholder="カテゴリを入力" style="display:none;margin-top:6px">
        </div>
        <div class="field">
          <label>ブランド・メーカー</label>
          <input type="text" id="f-brand" placeholder="例:LUPICIA、Harrods">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>茶種</label>
          <select id="f-kind"></select>
          <input type="text" id="f-kind-custom" placeholder="茶種を入力(例:ダージリン2nd 2024)" style="display:none;margin-top:6px">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>産地</label>
          <input type="text" id="f-origin" placeholder="例:静岡、ダージリン">
        </div>
        <div class="field">
          <label>購入年</label>
          <input type="text" id="f-year" placeholder="例:2023年">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>等級</label>
          <input type="text" id="f-grade" placeholder="例:FTGFOP1、BOP">
        </div>
        <div class="field">
          <label>ロット</label>
          <input type="text" id="f-lot" placeholder="例:DJ-12">
        </div>
      </div>
      <div class="field">
        <label>備考</label>
        <input type="text" id="f-memo" placeholder="例:London、ジャパン・ティーフェスティバル">
      </div>
      <div class="field">
        <label>評価</label>
        <div class="stars" id="f-stars">
          <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
        </div>
      </div>
      <div class="field">
        <label>感想・メモ</label>
        <textarea id="f-note" placeholder="味や香りの感想など"></textarea>
      </div>
      <div class="field">
        <label>写真</label>
        <div class="drop-zone" id="photo-drop">クリックして選択、または画像をドラッグ&ドロップ</div>
        <input type="file" id="f-photo" accept="image/*" style="display:none">
        <div id="photo-preview" style="display:none;margin-top:8px">
          <img id="photo-img" style="max-width:200px;max-height:200px;border-radius:8px;display:block;border:1px solid var(--border)">
          <button type="button" id="photo-remove" style="margin-top:6px;padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;color:#c0392b;cursor:pointer;font-size:0.8rem">写真を削除</button>
        </div>
      </div>
      <button class="btn" id="btn-save">記録する</button>
      <button class="btn" id="btn-cancel" style="display:none;background:#999;margin-top:8px">キャンセル</button>
    </div>
  </div>

  <!-- 一覧 -->
  <div class="panel" id="panel-list">
    <div class="filters">
      <input type="text" id="q-text" placeholder="名前・産地・ブランド・感想で検索">
      <select id="q-type">
        <option value="">すべてのカテゴリ</option>
      </select>
      <select id="q-rating">
        <option value="">すべての評価</option>
        <option value="5">★5</option><option value="4">★4</option><option value="3">★3</option><option value="le3">★3以下</option>
      </select>
      <button id="btn-excel" title="表示中のリストをExcel形式でダウンロード"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"/><polyline points="7 11 12 16 17 11"/><line x1="12" y1="4" x2="12" y2="16"/></svg></button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div id="count" style="font-size:0.85rem;color:var(--muted)"></div>
      <div style="display:flex;gap:6px;align-items:center">
        <select id="q-sort" style="padding:5px 6px;border:1px solid var(--border);border-radius:6px;font-size:0.8rem;background:#fff;color:var(--text)">
          <option value="">並び替えなし</option>
          <option value="brand">ブランド順</option>
          <option value="year-desc">購入年(新しい順)</option>
          <option value="year-asc">購入年(古い順)</option>
        </select>
        <button class="view-btn" id="view-list" title="リスト表示">☰</button>
        <button class="view-btn" id="view-tile" title="タイル表示">▦</button>
      </div>
    </div>
    <div id="records"></div>
  </div>

  <!-- 統計 -->
  <div class="panel" id="panel-stats">
    <div class="stat-summary">
      <div class="stat-box"><div class="num" id="s-total">0</div><div class="lbl">記録数</div></div>
      <div class="stat-box"><div class="num" id="s-month">0</div><div class="lbl">今年の購入</div></div>
      <div class="stat-box"><div class="num" id="s-avg">-</div><div class="lbl">平均評価</div></div>
    </div>
    <div class="card">
      <h2 class="section">種類別</h2>
      <div id="chart-type"></div>
    </div>
    <div class="card">
      <h2 class="section">購入年別</h2>
      <div id="chart-month"></div>
    </div>
    <div class="card">
      <h2 class="section">産地マップ</h2>
      <div style="position:relative">
        <div style="position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;z-index:1">
          <button class="map-btn" id="map-zoom-in">＋</button>
          <button class="map-btn" id="map-zoom-out">−</button>
          <button class="map-btn" id="map-zoom-reset" style="font-size:0.7rem">全体</button>
        </div>

<script>
const KEY = 'tea-records';
let records = [];
let rating = 0;

// IndexedDB(大容量保存対応)
let db = null;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('tea-app', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('records', { keyPath: 'id' });
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function dbPut(items) {
  return new Promise((res, rej) => {
    const tx = db.transaction('records', 'readwrite');
    const st = tx.objectStore('records');
    (Array.isArray(items) ? items : [items]).forEach(r => st.put(r));
    tx.oncomplete = () => { backupLS(); res(); };
    tx.onerror = () => { alert('保存に失敗しました'); rej(tx.error); };
  });
}
function dbClear() {
  return new Promise((res, rej) => {
    const tx = db.transaction('records', 'readwrite');
    tx.objectStore('records').clear();
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}
function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction('records', 'readwrite');
    tx.objectStore('records').delete(id);
    tx.oncomplete = () => { backupLS(); res(); };
    tx.onerror = () => rej(tx.error);
  });
}
function dbGetAll() {
  return new Promise((res, rej) => {
    const req = db.transaction('records').objectStore('records').getAll();
    req.onsuccess = () => res(req.result || []);
    req.onerror = () => rej(req.error);
  });
}
// テキストデータはlocalStorageにもバックアップ(写真は容量の関係で対象外)
function backupLS() {
  try {
    localStorage.setItem('tea-backup', JSON.stringify(records.map(r => {
      const { photo, ...rest } = r; return rest;
    })));
    if (records.some(r => r.photo)) localStorage.setItem('tea-had-photos', '1');
  } catch (e) {}
}
function showBanner(msg) {
  const d = document.createElement('div');
  d.style.cssText = 'background:#fff3cd;border:1px solid #e0c060;color:#7a5c00;padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:0.85rem';
  d.textContent = '⚠ ' + msg;
  document.querySelector('.container').prepend(d);
}
async function initDB() {
  db = await openDB();
  // 旧localStorageデータの移行(初回のみ)
  const legacy = localStorage.getItem(KEY);
  if (legacy) {
    try {
      const old = JSON.parse(legacy);
      old.forEach((r, i) => { if (r.ord === undefined) r.ord = i; });
      await dbPut(old);
      localStorage.removeItem(KEY);
    } catch (e) {}
  }
  if (navigator.storage && navigator.storage.persist) navigator.storage.persist();
  records = await dbGetAll();
  records.sort((a, b) => (a.ord || 0) - (b.ord || 0));
  // DBが空でバックアップがあれば復元
  if (!records.length) {
    try {
      const bk = JSON.parse(localStorage.getItem('tea-backup') || '[]');
      if (bk.length) {
        records = bk;
        await dbPut(records);
        showBanner('記録をバックアップから復元しました(写真データは復元できません)');
      }
    } catch (e) {}
  }
  // 前回写真を保存したのに1枚も残っていない場合は警告
  if (localStorage.getItem('tea-had-photos') && !records.some(r => r.photo)) {
    showBanner('前回保存した写真が見つかりません。この環境ではブラウザが画像データを保持できていない可能性があります。');
    localStorage.removeItem('tea-had-photos');
  }
  // 初期データ取り込み(初回のみ)
  if (!localStorage.getItem('tea-imported-v1') && SEED.length && !records.length) {
    const t = Date.now();
    records = SEED.map((r, i) => Object.assign({ id: t + i, ord: i, origin: '', rating: 0, note: '' }, r));
    await dbPut(records);
  }
  localStorage.setItem('tea-imported-v1', '1');
  fillSelect('f-type', TYPE_OPTIONS, 'type');
  fillSelect('f-kind', KIND_OPTIONS, 'kind');
  renderList();
}

function fillSelect(selId, base, field) {
  const sel = document.getElementById(selId);
  const used = records.map(r => r[field]).filter(Boolean);
  const opts = [...new Set([...base, ...used])];
  sel.innerHTML = '<option value="">選択してください</option>' +
    opts.map(o => `<option>${esc(o)}</option>`).join('') +
    '<option value="__custom__">自由入力…</option>';
}
function setupCustom(selId, customId) {
  const sel = document.getElementById(selId), custom = document.getElementById(customId);
  sel.addEventListener('change', () => {
    custom.style.display = sel.value === '__custom__' ? 'block' : 'none';
    if (sel.value === '__custom__') custom.focus();
  });
}
function selValue(selId, customId) {
  const v = document.getElementById(selId).value;
  return v === '__custom__' ? document.getElementById(customId).value.trim() : v;

let photoData = '';
function showPhoto() {
  document.getElementById('photo-preview').style.display = photoData ? 'block' : 'none';
  document.getElementById('photo-img').src = photoData || '';
}
function loadPhotoFile(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) { alert('画像ファイルをドロップしてください'); return; }
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    const max = 800;
    const k = Math.min(1, max / Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = Math.round(img.width * k); cv.height = Math.round(img.height * k);
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    photoData = cv.toDataURL('image/jpeg', 0.75);
    URL.revokeObjectURL(url);
    showPhoto();
  };
  img.onerror = () => { alert('画像を読み込めませんでした'); URL.revokeObjectURL(url); };
  img.src = url;
}
document.getElementById('f-photo').addEventListener('change', e => loadPhotoFile(e.target.files[0]));

dropZone.addEventListener('click', () => document.getElementById('f-photo').click());

dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {

  dropZone.classList.remove('over');

});

function resetForm() {
  editingId = null;
  ['f-name','f-origin','f-brand','f-year','f-grade','f-lot','f-memo','f-note',
   'f-type-custom','f-kind-custom','f-type','f-kind'].forEach(id => document.getElementById(id).value = '');
  ['f-type-custom','f-kind-custom'].forEach(id => document.getElementById(id).style.display = 'none');
  fillSelect('f-type', TYPE_OPTIONS, 'type');
  fillSelect('f-kind', KIND_OPTIONS, 'kind');
  rating = 0;
  starEls.forEach(x => x.classList.remove('on'));
  photoData = ''; document.getElementById('f-photo').value = ''; showPhoto();
  document.getElementById('btn-save').textContent = '記録する';
  document.getElementById('btn-cancel').style.display = 'none';
}

document.getElementById('btn-save').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('お茶の名前を入力してください'); return; }
  const data = {
    name,
    type: selValue('f-type', 'f-type-custom') || 'その他',
    origin: document.getElementById('f-origin').value.trim(),
    brand: document.getElementById('f-brand').value.trim(),
    kind: selValue('f-kind', 'f-kind-custom'),
    year: document.getElementById('f-year').value.trim(),
    grade: document.getElementById('f-grade').value.trim(),
    lot: document.getElementById('f-lot').value.trim(),
    memo: document.getElementById('f-memo').value.trim(),
    photo: photoData,
    rating,
    note: document.getElementById('f-note').value.trim()
  };
  if (editingId) {
    const r = records.find(x => x.id === editingId);
    if (r) { Object.assign(r, data); dbPut(r); }
  } else {
    const rec = Object.assign({ id: Date.now(),
      ord: records.length ? Math.min(...records.map(x => x.ord || 0)) - 1 : 0 }, data);
    records.unshift(rec);
    dbPut(rec);
  }
  resetForm();
  document.querySelector('[data-panel="list"]').click();
});

document.getElementById('btn-cancel').addEventListener('click', () => {
  resetForm();
  document.querySelector('[data-panel="list"]').click();
});

function editRecord(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  fillSelect('f-type', TYPE_OPTIONS, 'type');
  fillSelect('f-kind', KIND_OPTIONS, 'kind');
  const set = (fid, v) => document.getElementById(fid).value = v || '';
  set('f-name', r.name); set('f-type', r.type); set('f-brand', r.brand);
  set('f-kind', r.kind); set('f-origin', r.origin); set('f-year', r.year);
  set('f-grade', r.grade); set('f-lot', r.lot); set('f-memo', r.memo); set('f-note', r.note);
  ['f-type-custom','f-kind-custom'].forEach(i => {
    document.getElementById(i).style.display = 'none';
    document.getElementById(i).value = '';
  });
  photoData = r.photo || ''; document.getElementById('f-photo').value = ''; showPhoto();
  rating = r.rating || 0;
  starEls.forEach(x => x.classList.toggle('on', +x.dataset.v <= rating));
  document.getElementById('btn-save').textContent = '更新する';
  document.getElementById('btn-cancel').style.display = 'block';
  document.querySelector('[data-panel="add"]').click();
}

let lastList = [];
function renderList() {
  // カテゴリフィルタの選択肢を記録から動的に生成
  const sel = document.getElementById('q-type');
  const cur = sel.value;
  const TYPE_ORDER = ['紅茶','中国紅茶','台湾紅茶','和紅茶','東欧紅茶','ベトナム紅茶',
    'フレーバー','中国茶','台湾茶','和烏龍','緑茶','番茶','玄米茶','ほうじ茶',
    'ハーブ・ノンカフェイン','工芸茶','茶外茶'];
  const types = [...new Set(records.map(r => r.type).filter(Boolean))].sort((a, b) => {
    const ia = TYPE_ORDER.indexOf(a), ib = TYPE_ORDER.indexOf(b);
    return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib) || a.localeCompare(b);
  });
  sel.innerHTML = '<option value="">すべてのカテゴリ</option>' +
    types.map(t => `<option${t === cur ? ' selected' : ''}>${esc(t)}</option>`).join('');

  const q = document.getElementById('q-text').value.toLowerCase();
  const type = sel.value;
  const ratingV = document.getElementById('q-rating').value;
  const list = records
    .filter(r => !type || r.type === type)
    .filter(r => !ratingV || (ratingV === 'le3'
      ? (r.rating > 0 && r.rating <= 3)
      : r.rating === +ratingV))
    .filter(r => !q || [r.name, r.origin, r.brand, r.kind, r.year, r.grade, r.lot, r.memo, r.note]
      .join(' ').toLowerCase().includes(q));
  const sortV = document.getElementById('q-sort').value;
  const emptyLast = (a, b, key) => (!a[key] && b[key]) ? 1 : (a[key] && !b[key]) ? -1 : 0;
  if (sortV === 'brand') {
    list.sort((a, b) => emptyLast(a, b, 'brand')
      || (a.brand || '').localeCompare(b.brand || '', 'ja')
      || (a.name || '').localeCompare(b.name || '', 'ja'));
  } else if (sortV === 'year-desc') {
    list.sort((a, b) => emptyLast(a, b, 'year') || (b.year || '').localeCompare(a.year || ''));
  } else if (sortV === 'year-asc') {
    list.sort((a, b) => emptyLast(a, b, 'year') || (a.year || '').localeCompare(b.year || ''));
  }
  lastList = list;
  const filtered = q || type || ratingV;
  document.getElementById('count').textContent =
    filtered ? `${list.length}件 / 全${records.length}件` : `全${records.length}件`;
  const el = document.getElementById('records');
  if (!list.length) {
    el.className = '';
    el.innerHTML = '<div class="empty">' + (records.length ? '該当する記録がありません' : 'まだ記録がありません。「記録する」から追加しましょう 🍵') + '</div>';
    return;
  }
  el.className = viewMode === 'tile' ? 'tiles' : '';
  if (viewMode === 'tile') {
    el.innerHTML = list.map(r => `
    <div class="tile" onclick="editRecord(${r.id})">
      <div class="tile-img">${r.photo ? `<img src="${r.photo}">` : TILE_ICON}</div>
      <div class="tile-name">${esc(r.name)}</div>
      <button class="del" title="削除" onclick="event.stopPropagation();delRecord(${r.id})">✕</button>
    </div>`).join('');
    return;
  }
  el.innerHTML = list.map(r => {
    const details = [
      r.kind && '茶種: ' + esc(r.kind),
      r.grade && '等級: ' + esc(r.grade),
      r.lot && 'ロット: ' + esc(r.lot),
      r.origin && '産地: ' + esc(r.origin),
      r.year && '購入年: ' + esc(r.year),
      r.memo && '備考: ' + esc(r.memo)
    ].filter(Boolean).join(' ・ ');
    return `
    <div class="card record rec-flex" onclick="editRecord(${r.id})">

  }).join('');
}

function delRecord(id) {
  if (!confirm('この記録を削除しますか?')) return;
  records = records.filter(r => r.id !== id);
  dbDelete(id);
  renderList();
}

// 統計
function bars(el, data, max) {
  el.innerHTML = data.length ? data.map(([label, n]) => `
    <div class="bar-row">
      <div class="bar-label">${esc(label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${max ? (n / max * 100) : 0}%"></div></div>
      <div class="bar-val">${n}件</div>
    </div>`).join('') : '<div class="empty">データがありません</div>';
}

function renderStats() {
  document.getElementById('s-total').textContent = records.length;
  const thisYear = String(new Date().getFullYear());
  document.getElementById('s-month').textContent =
    records.filter(r => (r.year || '').includes(thisYear)).length;
  const rated = records.filter(r => r.rating > 0);
  document.getElementById('s-avg').textContent = rated.length
    ? (rated.reduce((s, r) => s + r.rating, 0) / rated.length).toFixed(1) + ' ★' : '-';

  // 種類別
  const byType = {};
  records.forEach(r => byType[r.type] = (byType[r.type] || 0) + 1);
  const typeData = Object.entries(byType).sort((a, b) => b[1] - a[1]);
  bars(document.getElementById('chart-type'), typeData, typeData[0]?.[1] || 0);

  // 購入年別
  const byYear = {};
  records.forEach(r => { const y = r.year || '不明'; byYear[y] = (byYear[y] || 0) + 1; });
  const yearData = Object.entries(byYear).sort((a, b) => a[0].localeCompare(b[0]));
  bars(document.getElementById('chart-month'), yearData, Math.max(...yearData.map(x => x[1]), 1));

  renderMap();
}

// 地図の拡大縮小・移動
const svgMap = document.getElementById('world-map');
let vb = { x: 0, y: 0, w: 1000, h: 500 };
function applyVB() {
  svgMap.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  const k = vb.w / 1000; // ピンは画面上で一定サイズに
  document.querySelectorAll('#map-pins circle').forEach(c => {
    c.setAttribute('r', (+c.dataset.r * k).toFixed(2));
    c.setAttribute('stroke-width', k);
  });
}
function clampVB() {
  vb.x = Math.max(0, Math.min(1000 - vb.w, vb.x));
  vb.y = Math.max(0, Math.min(500 - vb.h, vb.y));
}
function zoomMap(factor, cx, cy) {
  const nw = Math.min(1000, Math.max(40, vb.w * factor));
  const f = nw / vb.w;
  vb.x = cx - (cx - vb.x) * f;
  vb.y = cy - (cy - vb.y) * f;
  vb.w = nw; vb.h = nw / 2;
  clampVB(); applyVB();
}
function svgPoint(e) {
  const r = svgMap.getBoundingClientRect();
  return [vb.x + (e.clientX - r.left) / r.width * vb.w,
          vb.y + (e.clientY - r.top) / r.height * vb.h];
}
svgMap.addEventListener('wheel', e => {
  e.preventDefault();
  const [cx, cy] = svgPoint(e);
  zoomMap(e.deltaY > 0 ? 1.25 : 0.8, cx, cy);
}, { passive: false });
let mapDrag = null;
svgMap.addEventListener('pointerdown', e => {
  mapDrag = [e.clientX, e.clientY, vb.x, vb.y];
  svgMap.setPointerCapture(e.pointerId);
  svgMap.style.cursor = 'grabbing';
});
svgMap.addEventListener('pointermove', e => {
  if (!mapDrag) return;
  const r = svgMap.getBoundingClientRect();
  vb.x = mapDrag[2] - (e.clientX - mapDrag[0]) / r.width * vb.w;
  vb.y = mapDrag[3] - (e.clientY - mapDrag[1]) / r.height * vb.h;
  clampVB(); applyVB();
});
['pointerup', 'pointercancel'].forEach(ev =>
  svgMap.addEventListener(ev, () => { mapDrag = null; svgMap.style.cursor = 'grab'; }));

const CRC_TABLE = (() => { const t = new Uint32Array(256); for (let i = 0; i < 256; i++) { let c = i; for (let j = 0; j < 8; j++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1; t[i] = c; } return t; })();
function crc32(u8) { let c = 0xFFFFFFFF; for (let i = 0; i < u8.length; i++) c = CRC_TABLE[(c ^ u8[i]) & 0xFF] ^ (c >>> 8); return (c ^ 0xFFFFFFFF) >>> 0; }
function makeZip(files) {
  const enc = new TextEncoder(); const parts = []; const central = []; let offset = 0;
  files.forEach(f => {
    const name = enc.encode(f.name), data = enc.encode(f.data), crc = crc32(data);
    const h = new DataView(new ArrayBuffer(30));
    h.setUint32(0, 0x04034b50, true); h.setUint16(4, 20, true);
    h.setUint32(14, crc, true); h.setUint32(18, data.length, true); h.setUint32(22, data.length, true);
    h.setUint16(26, name.length, true);
    parts.push(new Uint8Array(h.buffer), name, data);
    const c = new DataView(new ArrayBuffer(46));
    c.setUint32(0, 0x02014b50, true); c.setUint16(4, 20, true); c.setUint16(6, 20, true);
    c.setUint32(16, crc, true); c.setUint32(20, data.length, true); c.setUint32(24, data.length, true);
    c.setUint16(28, name.length, true); c.setUint32(42, offset, true);
    central.push(new Uint8Array(c.buffer), name);
    offset += 30 + name.length + data.length;
  });
  const cdSize = central.reduce((s, a) => s + a.length, 0);
  const e = new DataView(new ArrayBuffer(22));
  e.setUint32(0, 0x06054b50, true); e.setUint16(8, files.length, true); e.setUint16(10, files.length, true);
  e.setUint32(12, cdSize, true); e.setUint32(16, offset, true);
  const out = new Uint8Array(offset + cdSize + 22); let p = 0;
  [...parts, ...central, new Uint8Array(e.buffer)].forEach(a => { out.set(a, p); p += a.length; });
  return out;
}
function colName(i) { let s = ''; i++; while (i > 0) { s = String.fromCharCode(65 + (i - 1) % 26) + s; i = Math.floor((i - 1) / 26); } return s; }
function xmlEsc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function makeXlsx(rows) {
  const sheet = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>' +
    rows.map((row, ri) => '<row r="' + (ri + 1) + '">' + row.map((v, ci) => {
      const ref = colName(ci) + (ri + 1);
      if (typeof v === 'number') return '<c r="' + ref + '"><v>' + v + '</v></c>';
      if (v === '' || v == null) return '';
      return '<c r="' + ref + '" t="inlineStr"><is><t xml:space="preserve">' + xmlEsc(v) + '</t></is></c>';
    }).join('') + '</row>').join('') + '</sheetData></worksheet>';
  return makeZip([
    { name: '[Content_Types].xml', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>' },
    { name: '_rels/.rels', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>' },
    { name: 'xl/workbook.xml', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Tea list" sheetId="1" r:id="rId1"/></sheets></workbook>' },
    { name: 'xl/_rels/workbook.xml.rels', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>' },
    { name: 'xl/worksheets/sheet1.xml', data: sheet }
  ]);
}

  if (!data.length) { alert('ダウンロードする記録がありません'); return; }
  const rows = [['銘柄名','カテゴリ','茶種','ブランド','産地','購入年','等級','ロット','備考','評価','感想']]
    .concat(data.map(r => [r.name||'', r.type||'', r.kind||'', r.brand||'', r.origin||'', r.year||'',
      r.grade||'', r.lot||'', r.memo||'', r.rating||'', r.note||'']));
  const blob = new Blob([makeXlsx(rows)], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Tea_list.xlsx';
  a.click();
  URL.revokeObjectURL(a.href);
});



// データ管理メニュー(書き出し/読み込み)
const menuBtn = document.getElementById('menu-btn');
const menuPop = document.getElementById('menu-pop');
menuBtn.addEventListener('click', e => {
  e.stopPropagation();
  menuPop.style.display = menuPop.style.display === 'block' ? 'none' : 'block';
});
document.addEventListener('click', e => {
  if (!menuPop.contains(e.target)) menuPop.style.display = 'none';
});
document.getElementById('btn-export').addEventListener('click', () => {
  menuPop.style.display = 'none';
  const blob = new Blob([JSON.stringify(records)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `Tea_list_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
});
document.getElementById('btn-import').addEventListener('click', () => {
  menuPop.style.display = 'none';
  document.getElementById('file-import').click();
});
document.getElementById('file-import').addEventListener('change', e => {
  const f = e.target.files[0];
  e.target.value = '';
  if (!f) return;
  const rd = new FileReader();
  rd.onload = async () => {
    try {
      const data = JSON.parse(rd.result);
      if (!Array.isArray(data) || !data.every(r => r && r.id && r.name)) throw 0;
      if (!confirm('現在のデータを、読み込んだ' + data.length + '件で置き換えます。よろしいですか?')) return;
      await dbClear();
      records = data;
      await dbPut(records);
      renderList();
      alert(data.length + '件を読み込みました');
    } catch (err) { alert('読み込めないファイルです。「データを書き出す」で作成したJSONファイルを指定してください。'); }
  };
  rd.readAsText(f);
});

initDB();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
